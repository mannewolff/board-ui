name: Release and notify kit

# Sync-Trigger (board-ui-Seite, Issue #2): Jeder Push auf production erzeugt ein
# Release mit den Board-Artefakten und benachrichtigt das claude-workflow-kit,
# damit es die eingebetteten Blobs in install.mjs neu generiert (Gegenstück: Issue #3).
#
# Voraussetzungen:
# - Version in package.json vor dem Merge auf production erhöhen (der Tag heißt v<version>).
# - Repository-Secret KIT_DISPATCH_TOKEN: PAT oder GitHub-App-Token mit Schreibrecht
#   (contents/dispatch) auf mannewolff/claude-workflow-kit. Der eingebaute GITHUB_TOKEN
#   reicht nur für das eigene Repo, nicht für den Cross-Repo-Dispatch.

on:
  push:
    branches: [production]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version aus package.json lesen
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Release mit Board-Artefakten erzeugen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG existiert bereits, überspringe (Version in package.json erhöhen)."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automatisches Release aus production. Enthält src/board.mjs und src/board-ui.mjs." \
            src/board.mjs src/board-ui.mjs

      - name: Kit über neues Release benachrichtigen
        env:
          GH_TOKEN: ${{ secrets.KIT_DISPATCH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "KIT_DISPATCH_TOKEN nicht gesetzt, überspringe Dispatch." >&2
            exit 0
          fi
          gh api repos/mannewolff/claude-workflow-kit/dispatches \
            -f event_type=board-ui-release \
            -F client_payload[version]="${VERSION}" \
            -F client_payload[tag]="v${VERSION}"
